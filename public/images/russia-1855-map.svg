<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Annotated map of Russia in 1855</title>
  <desc id="desc">A clean annotated map-style visual of the Russian Empire in 1855 showing European Russia, Siberia, borderlands, St Petersburg, Moscow and Crimea, with notes explaining why scale and diversity made Russia difficult to govern.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbfd" />
      <stop offset="0.58" stop-color="#eef7fb" />
      <stop offset="1" stop-color="#f5f0fb" />
    </linearGradient>
    <linearGradient id="empire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9edf1" />
      <stop offset="0.46" stop-color="#e5f3ee" />
      <stop offset="1" stop-color="#eee8f7" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#142244" flood-opacity="0.14" />
    </filter>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#cfe0e8" stroke-width="1" opacity="0.55" />
    </pattern>
    <style>
      .title{font:900 44px/1.1 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#142244;letter-spacing:-1.2px}
      .subtitle{font:750 22px/1.3 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#5f7088}
      .label{font:900 25px/1.1 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#142244}
      .small{font:740 18px/1.3 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#5f7088}
      .tiny{font:850 14px/1 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#142244;letter-spacing:.07em;text-transform:uppercase}
      .whiteTiny{font:900 14px/1 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#fff;letter-spacing:.05em;text-transform:uppercase}
      .sea{font:800 18px/1 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#7d95a9;letter-spacing:.06em;text-transform:uppercase}
      .callout{fill:#fff;stroke:#d6e5ed;stroke-width:2.6;filter:url(#softShadow)}
      .leader{stroke:#142244;stroke-width:3.6;stroke-linecap:round;fill:none;opacity:.72}
      .border{stroke:#6c8f9b;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:url(#empire);filter:url(#softShadow)}
      .internal{stroke:#8fb1bb;stroke-width:2;stroke-dasharray:8 10;fill:none;opacity:.62}
      .route{stroke:#6b84a6;stroke-width:7;stroke-linecap:round;stroke-dasharray:16 18;fill:none;opacity:.52}
    </style>
  </defs>

  <rect width="1400" height="920" rx="46" fill="url(#paper)" />
  <rect x="42" y="42" width="1316" height="836" rx="38" fill="#fff" opacity="0.62" stroke="#d6e5ed" stroke-width="3" />
  <rect x="72" y="156" width="1256" height="610" rx="30" fill="url(#grid)" opacity="0.72" />

  <text x="86" y="94" class="title">Russia in 1855: why scale mattered</text>
  <text x="86" y="130" class="subtitle">AQA focus: geography, diversity and weak communications made autocratic control uneven.</text>

  <text x="108" y="230" class="sea">Baltic Sea</text>
  <text x="153" y="660" class="sea">Black Sea</text>
  <text x="1046" y="275" class="sea">Siberia</text>

  <!-- Map-style simplified outline of the Russian Empire in 1855 -->
  <path class="border" d="
    M126 420
    C156 356 214 306 296 285
    C357 270 418 282 478 266
    C552 246 612 205 703 205
    C784 204 828 170 910 174
    C997 177 1063 208 1122 234
    C1190 264 1268 274 1304 333
    C1270 372 1277 414 1228 443
    C1176 474 1167 520 1119 548
    C1067 578 982 560 923 591
    C851 629 771 633 705 663
    C629 697 529 681 458 641
    C392 604 333 609 260 585
    C188 562 111 516 126 420
    Z" />

  <!-- Internal divisions to create a more authentic annotated-map feel -->
  <path class="internal" d="M387 292 C405 365 397 438 370 598" />
  <path class="internal" d="M546 257 C559 358 553 469 514 654" />
  <path class="internal" d="M705 208 C684 326 687 474 704 664" />
  <path class="internal" d="M887 180 C838 311 830 456 844 617" />
  <path class="internal" d="M1058 214 C1010 335 1006 456 1031 563" />
  <path class="internal" d="M180 392 C364 367 531 369 696 351 C872 332 1053 319 1261 337" />
  <path class="internal" d="M171 484 C329 500 480 494 626 482 C802 467 969 468 1167 491" />

  <!-- Communication route -->
  <path class="route" d="M278 395 C382 384 498 399 612 381 C724 364 842 342 1003 350" />
  <text x="520" y="353" class="tiny">slow communications over huge distances</text>

  <!-- City markers -->
  <circle cx="279" cy="394" r="13" fill="#142244" stroke="#fff" stroke-width="5" />
  <circle cx="390" cy="445" r="12" fill="#142244" stroke="#fff" stroke-width="5" />
  <circle cx="252" cy="575" r="12" fill="#142244" stroke="#fff" stroke-width="5" />
  <rect x="222" y="330" width="206" height="44" rx="22" fill="#142244" />
  <text x="244" y="358" class="whiteTiny">St Petersburg</text>
  <rect x="404" y="454" width="128" height="42" rx="21" fill="#142244" />
  <text x="432" y="481" class="whiteTiny">Moscow</text>
  <rect x="166" y="588" width="120" height="42" rx="21" fill="#142244" />
  <text x="193" y="615" class="whiteTiny">Crimea</text>

  <!-- Region labels on the map -->
  <text x="312" y="508" class="label" opacity="0.88">European Russia</text>
  <text x="842" y="424" class="label" opacity="0.88">Siberia</text>
  <text x="706" y="614" class="label" opacity="0.88">Borderlands</text>

  <!-- Callouts -->
  <rect x="92" y="188" width="306" height="106" rx="22" class="callout" />
  <text x="122" y="228" class="label">Political core</text>
  <text x="122" y="257" class="small">St Petersburg and Moscow</text>
  <text x="122" y="282" class="small">were far from much of empire.</text>
  <path class="leader" d="M295 294 L286 384" />

  <rect x="966" y="144" width="300" height="118" rx="22" class="callout" />
  <text x="996" y="184" class="label">Huge distances</text>
  <text x="996" y="214" class="small">Orders took time to travel;</text>
  <text x="996" y="239" class="small">local control was uneven.</text>
  <path class="leader" d="M1038 263 L933 365" />

  <rect x="990" y="596" width="318" height="126" rx="22" class="callout" />
  <text x="1020" y="636" class="label">Diversity</text>
  <text x="1020" y="666" class="small">Many nationalities, languages</text>
  <text x="1020" y="691" class="small">and religions complicated rule.</text>
  <path class="leader" d="M1006 596 L890 552" />

  <rect x="86" y="650" width="346" height="110" rx="22" class="callout" />
  <text x="116" y="690" class="label">Crimean War warning</text>
  <text x="116" y="720" class="small">Defeat exposed weak transport,</text>
  <text x="116" y="745" class="small">industry and administration.</text>
  <path class="leader" d="M255 650 L253 587" />

  <rect x="471" y="790" width="772" height="58" rx="20" fill="#ffffff" stroke="#d6e5ed" stroke-width="3" />
  <text x="501" y="826" class="small">Key judgement: Russia looked powerful on a map, but its size made centralised autocratic government difficult in practice.</text>

  <g transform="translate(90 790)">
    <rect width="338" height="58" rx="20" fill="#142244" />
    <text x="24" y="36" class="whiteTiny">1855 governing problem map</text>
  </g>
</svg>
