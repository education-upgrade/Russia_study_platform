<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Annotated map of Russia in 1855</title>
  <desc id="desc">A stylised annotated map showing the scale of the Russian Empire in 1855, with labels for European Russia, Siberia, the borderlands, St Petersburg, Moscow and Crimea.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7fb"/><stop offset="1" stop-color="#f3eefb"/></linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#dceef1"/><stop offset="0.45" stop-color="#e8f4ee"/><stop offset="1" stop-color="#efe9f8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#142244" flood-opacity="0.16"/></filter>
    <style>.title{font:900 42px/1.1 system-ui,-apple-system,Segoe UI,sans-serif;fill:#142244;letter-spacing:-1px}.subtitle{font:800 22px/1.25 system-ui,-apple-system,Segoe UI,sans-serif;fill:#66758c}.label{font:900 25px/1.05 system-ui,-apple-system,Segoe UI,sans-serif;fill:#142244}.small{font:750 18px/1.25 system-ui,-apple-system,Segoe UI,sans-serif;fill:#66758c}.micro{font:850 15px/1 system-ui,-apple-system,Segoe UI,sans-serif;fill:#fff;letter-spacing:.8px}.callout{fill:#ffffff;stroke:#d7e6ed;stroke-width:3;filter:url(#shadow)}.line{stroke:#142244;stroke-width:4;stroke-linecap:round;fill:none;opacity:.75}.route{stroke:#6b84a6;stroke-width:8;stroke-linecap:round;stroke-dasharray:18 20;fill:none;opacity:.55}</style>
  </defs>
  <rect width="1200" height="760" rx="42" fill="url(#bg)"/><rect x="34" y="34" width="1132" height="692" rx="34" fill="#ffffff" fill-opacity=".68" stroke="#d7e6ed" stroke-width="3"/>
  <text x="74" y="86" class="title">Russia in 1855: a vast empire</text><text x="74" y="122" class="subtitle">Distance, diversity and weak communications made autocratic control harder.</text>
  <path d="M93 383 C152 310 251 261 355 252 C462 242 517 282 607 254 C701 224 772 161 897 172 C1003 182 1080 231 1122 303 C1082 363 1094 438 1017 493 C934 553 805 528 714 568 C611 614 505 619 421 572 C335 523 267 525 181 492 C114 466 74 432 93 383Z" fill="url(#land)" stroke="#91b5bf" stroke-width="5" filter="url(#shadow)"/>
  <path class="route" d="M272 357 C381 341 499 351 624 332 C738 315 858 297 1010 313"/><circle cx="278" cy="356" r="12" fill="#142244"/><circle cx="367" cy="376" r="11" fill="#142244"/><circle cx="226" cy="453" r="11" fill="#142244"/>
  <rect x="188" y="185" width="242" height="104" rx="22" class="callout"/><text x="218" y="225" class="label">European Russia</text><text x="218" y="254" class="small">Political core, main</text><text x="218" y="278" class="small">population centres</text><path class="line" d="M320 291 L296 347"/>
  <rect x="748" y="118" width="290" height="112" rx="22" class="callout"/><text x="778" y="158" class="label">Siberia</text><text x="778" y="188" class="small">Huge distances and</text><text x="778" y="212" class="small">slow communication</text><path class="line" d="M848 230 L756 310"/>
  <rect x="778" y="511" width="326" height="116" rx="22" class="callout"/><text x="808" y="551" class="label">Borderlands</text><text x="808" y="581" class="small">Ethnic and religious</text><text x="808" y="605" class="small">diversity complicated rule</text><path class="line" d="M805 511 L712 455"/>
  <rect x="93" y="512" width="292" height="112" rx="22" class="callout"/><text x="123" y="552" class="label">Crimea</text><text x="123" y="582" class="small">War exposed transport,</text><text x="123" y="606" class="small">army and state weakness</text><path class="line" d="M246 512 L226 462"/>
  <rect x="252" y="392" width="184" height="46" rx="23" fill="#142244"/><text x="276" y="422" class="micro">St Petersburg</text><rect x="382" y="442" width="128" height="46" rx="23" fill="#142244"/><text x="410" y="472" class="micro">Moscow</text>
  <rect x="486" y="648" width="622" height="54" rx="20" fill="#ffffff" stroke="#d7e6ed" stroke-width="3"/><text x="514" y="682" class="small">Key idea: Russia looked powerful on a map, but distance made central control uneven.</text>
</svg>
